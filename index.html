<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte des communes belges — Répartition des kinésithérapeutes</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel-2:#273449; --line:#334155;
    --txt:#e2e8f0; --txt-dim:#94a3b8; --accent:#38bdf8; --accent-soft:#0ea5e9;
    --c1:#2166ac; --c2:#92c5de; --c3:#f7f7f7; --c4:#f4a582; --c5:#b2182b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg); color:var(--txt); overflow:hidden;
    display:flex; flex-direction:column; height:100vh;
  }
  header{
    padding:14px 22px; background:linear-gradient(90deg,#0b1220,#162338);
    border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
  }
  header h1{font-size:18px; font-weight:600; letter-spacing:.2px}
  header h1 span{color:var(--accent)}
  header .sub{font-size:12.5px; color:var(--txt-dim)}
  .main{flex:1; display:flex; min-height:0}
  #map{flex:1; background:#0b1220}
  .sidebar{
    width:380px; background:var(--panel); border-left:1px solid var(--line);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .panel-section{padding:16px 18px; border-bottom:1px solid var(--line)}
  .panel-section h2{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--txt-dim); margin-bottom:10px; font-weight:600}
  select, input{
    width:100%; padding:9px 11px; background:var(--panel-2); color:var(--txt);
    border:1px solid var(--line); border-radius:8px; font-size:13.5px; outline:none;
  }
  select:focus, input:focus{border-color:var(--accent)}
  .var-desc{font-size:12px; color:var(--txt-dim); margin-top:8px; line-height:1.45}
  .legend{display:flex; flex-direction:column; gap:5px; margin-top:12px}
  .legend-row{display:flex; align-items:center; gap:9px; font-size:12px; color:var(--txt-dim)}
  .swatch{width:22px; height:14px; border-radius:3px; flex-shrink:0; border:1px solid rgba(255,255,255,.12)}
  .commune-panel{flex:1; overflow-y:auto; padding:0}
  .placeholder{padding:40px 22px; text-align:center; color:var(--txt-dim); font-size:13px; line-height:1.6}
  .placeholder svg{opacity:.35; margin-bottom:14px}
  .commune-head{padding:18px; background:linear-gradient(135deg,#1c2c46,#16233a); border-bottom:1px solid var(--line)}
  .commune-head .name{font-size:21px; font-weight:700}
  .commune-head .prov{font-size:12.5px; color:var(--accent); margin-top:3px; font-weight:500}
  .commune-head .nis{font-size:11px; color:var(--txt-dim); margin-top:6px; font-family:monospace}
  table.stats{width:100%; border-collapse:collapse}
  table.stats tr{border-bottom:1px solid var(--panel-2)}
  table.stats tr.hl{background:rgba(56,189,248,.10)}
  table.stats td{padding:9px 18px; font-size:13px; vertical-align:top}
  table.stats td.lbl{color:var(--txt-dim)}
  table.stats td.val{text-align:right; font-weight:600; white-space:nowrap; font-variant-numeric:tabular-nums}
  table.stats td.val .unit{color:var(--txt-dim); font-weight:400; font-size:11px; margin-left:3px}
  .chip{display:inline-block; padding:1px 6px; border-radius:5px; font-size:11px; margin-left:6px}
  .chip.up{background:rgba(34,197,94,.18); color:#4ade80}
  .chip.down{background:rgba(239,68,68,.18); color:#f87171}
  .footer-note{padding:11px 18px; font-size:11px; color:var(--txt-dim); line-height:1.5}
  /* Leaflet tweaks */
  .leaflet-container{background:#0b1220}
  .leaflet-tooltip.commune-tip{
    background:#0b1220; color:#e2e8f0; border:1px solid var(--accent);
    border-radius:6px; padding:6px 10px; font-size:12.5px; box-shadow:0 4px 14px rgba(0,0,0,.5);
  }
  .leaflet-tooltip.commune-tip b{color:#fff}
  .leaflet-tooltip.commune-tip .tv{color:var(--accent); font-weight:600}
  .leaflet-bar a{background:var(--panel-2); color:var(--txt); border-bottom-color:var(--line)}
  .leaflet-bar a:hover{background:var(--panel)}
  .searchbox{position:relative}
  .results{position:absolute; top:42px; left:0; right:0; background:var(--panel-2); border:1px solid var(--line);
    border-radius:8px; max-height:230px; overflow-y:auto; z-index:1000; display:none}
  .results.show{display:block}
  .results div{padding:8px 11px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--panel)}
  .results div:hover, .results div.active{background:var(--accent-soft); color:#001}
  .results .rp{color:var(--txt-dim); font-size:11px}
  .results div:hover .rp, .results div.active .rp{color:#013}
  @media(max-width:860px){
    .main{flex-direction:column}
    .sidebar{width:100%; height:48%; border-left:none; border-top:1px solid var(--line)}
    #map{height:52%}
  }
</style>
</head>
<body>
<header>
  <h1>Communes belges · <span>Densité de kinésithérapeutes</span></h1>
  <div class="sub">565 communes — cliquez sur une commune pour afficher ses statistiques · TFE</div>
</header>
<div class="main">
  <div id="map"></div>
  <aside class="sidebar">
    <div class="panel-section">
      <h2>Indicateur cartographié</h2>
      <select id="varSelect"></select>
      <div class="var-desc" id="varDesc"></div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="panel-section searchbox">
      <h2>Rechercher une commune</h2>
      <input type="text" id="search" placeholder="Nom de la commune…" autocomplete="off">
      <div class="results" id="results"></div>
    </div>
    <div class="commune-panel" id="communePanel">
      <div class="placeholder" id="placeholder">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l5.447 2.724A1 1 0 0021 18.382V7.618a1 1 0 00-1.447-.894L15 4m0 13V4m0 0L9 7"/>
        </svg>
        <div>Sélectionnez une commune sur la carte<br>pour afficher le détail de ses statistiques.</div>
      </div>
    </div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const COLORS = ['#2166ac','#92c5de','#f7f7f7','#f4a582','#b2182b'];
const NEUTRAL = '#475569';
let META, STATS, GEO, geoLayer, currentVar, breaks=[], layersByNis={}, selectedNis=null;

function fmt(v, dec){
  if(v===null||v===undefined||isNaN(v)) return '—';
  return Number(v).toLocaleString('fr-BE',{minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function quantileBreaks(values){
  const s=[...values].sort((a,b)=>a-b);
  const q=p=>{const i=(s.length-1)*p, lo=Math.floor(i), hi=Math.ceil(i);
    return s[lo]+(s[hi]-s[lo])*(i-lo);};
  return [q(0.2),q(0.4),q(0.6),q(0.8)];
}
function classOf(v){
  if(v===null||v===undefined||isNaN(v)) return -1;
  if(v<breaks[0]) return 0;
  if(v<breaks[1]) return 1;
  if(v<breaks[2]) return 2;
  if(v<breaks[3]) return 3;
  return 4;
}
function colorOf(v){const c=classOf(v); return c<0?NEUTRAL:COLORS[c];}

function styleFor(feature){
  const nis=feature.properties.nis;
  const v=STATS.stats[nis] ? STATS.stats[nis].v[currentVar] : null;
  return {
    fillColor: colorOf(v), fillOpacity:.82,
    color: nis===selectedNis ? '#38bdf8' : '#0b1220',
    weight: nis===selectedNis ? 2.5 : 0.5,
  };
}

function buildVarSelect(){
  const sel=document.getElementById('varSelect');
  META.columns.forEach(c=>{
    const o=document.createElement('option'); o.value=c.key; o.textContent=c.label; sel.appendChild(o);
  });
  sel.value=currentVar;
  sel.addEventListener('change',()=>{currentVar=sel.value; refresh();});
}
function colMeta(){return META.columns.find(c=>c.key===currentVar);}

function refresh(){
  const cm=colMeta();
  document.getElementById('varDesc').textContent=cm.desc;
  const vals=Object.values(STATS.stats).map(s=>s.v[currentVar]).filter(v=>v!==null&&!isNaN(v));
  breaks=quantileBreaks(vals);
  geoLayer.setStyle(styleFor);
  buildLegend(cm);
  if(selectedNis) renderCommune(selectedNis);
}
function buildLegend(cm){
  const lg=document.getElementById('legend'); lg.innerHTML='';
  const lo=Math.min(...Object.values(STATS.stats).map(s=>s.v[currentVar]).filter(v=>v!==null&&!isNaN(v)));
  const hi=Math.max(...Object.values(STATS.stats).map(s=>s.v[currentVar]).filter(v=>v!==null&&!isNaN(v)));
  const edges=[lo,...breaks,hi];
  for(let i=0;i<5;i++){
    const row=document.createElement('div'); row.className='legend-row';
    row.innerHTML=`<span class="swatch" style="background:${COLORS[i]}"></span>
      <span>${fmt(edges[i],cm.dec)} – ${fmt(edges[i+1],cm.dec)} ${cm.unit}</span>`;
    lg.appendChild(row);
  }
}

function tooltipHtml(nis){
  const s=STATS.stats[nis]; const cm=colMeta();
  if(!s) return nis;
  const v=s.v[currentVar];
  return `<b>${s.commune}</b><br><span class="tv">${fmt(v,cm.dec)} ${cm.unit}</span> · ${cm.label}`;
}

function renderCommune(nis){
  selectedNis=nis;
  const s=STATS.stats[nis];
  const panel=document.getElementById('communePanel');
  let rows='';
  META.columns.forEach(c=>{
    const v=s.v[c.key];
    const isEvol=c.key.startsWith('evol_');
    let chip='';
    if(isEvol && v!==null && !isNaN(v)){
      chip = v>0 ? `<span class="chip up">▲</span>` : (v<0 ? `<span class="chip down">▼</span>` : '');
    }
    rows+=`<tr class="${c.key===currentVar?'hl':''}">
      <td class="lbl">${c.label}</td>
      <td class="val">${fmt(v,c.dec)}<span class="unit">${c.unit}</span>${chip}</td></tr>`;
  });
  panel.innerHTML=`
    <div class="commune-head">
      <div class="name">${s.commune}</div>
      <div class="prov">${PROV[s.province]||s.province}</div>
      <div class="nis">Code NIS ${nis}</div>
    </div>
    <table class="stats">${rows}</table>
    <div class="footer-note">L'indicateur actuellement cartographié est surligné. ▲/▼ indiquent le sens de l'évolution 2024→2025.</div>`;
  geoLayer.setStyle(styleFor);
}
const PROV={'ANT':'Province d\'Anvers','BF':'Brabant flamand','BW':'Brabant wallon','BXL':'Bruxelles-Capitale',
  'F-Occ':'Flandre occidentale','F-Or':'Flandre orientale','HAI':'Hainaut','LIÉ':'Province de Liège',
  'LIM':'Limbourg','LUX':'Province de Luxembourg','NAM':'Province de Namur'};

// ---- Recherche ----
function setupSearch(){
  const input=document.getElementById('search'), box=document.getElementById('results');
  let items=Object.entries(STATS.stats).map(([nis,s])=>({nis,nom:s.commune,prov:s.province}));
  let active=-1, shown=[];
  function render(list){
    shown=list; active=-1;
    box.innerHTML=list.map((it,i)=>`<div data-nis="${it.nis}"><b>${it.nom}</b> <span class="rp">${PROV[it.prov]||it.prov}</span></div>`).join('');
    box.classList.toggle('show',list.length>0);
    box.querySelectorAll('div').forEach(d=>d.addEventListener('click',()=>select(d.dataset.nis)));
  }
  function select(nis){
    input.value=STATS.stats[nis].commune; box.classList.remove('show');
    focusCommune(nis);
  }
  input.addEventListener('input',()=>{
    const q=input.value.trim().toLowerCase();
    if(q.length<1){box.classList.remove('show');return;}
    render(items.filter(it=>it.nom.toLowerCase().includes(q)).slice(0,40));
  });
  input.addEventListener('keydown',e=>{
    const ds=box.querySelectorAll('div');
    if(e.key==='ArrowDown'){active=Math.min(active+1,ds.length-1);}
    else if(e.key==='ArrowUp'){active=Math.max(active-1,0);}
    else if(e.key==='Enter'){if(active>=0&&shown[active])select(shown[active].nis);return;}
    else return;
    ds.forEach((d,i)=>d.classList.toggle('active',i===active));
    if(ds[active])ds[active].scrollIntoView({block:'nearest'});
    e.preventDefault();
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.searchbox'))box.classList.remove('show');});
}
function focusCommune(nis){
  const layer=layersByNis[nis];
  if(layer){map.fitBounds(layer.getBounds(),{maxZoom:11,padding:[40,40]});}
  renderCommune(nis);
}

// ---- Carte ----
let map;
async function init(){
  map=L.map('map',{zoomControl:true, minZoom:7, maxZoom:13, preferCanvas:true}).setView([50.64,4.66],8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; <a href="https://carto.com/">CARTO</a> · &copy; OpenStreetMap', opacity:.35, subdomains:'abcd'
  }).addTo(map);

  const [statsData,geoData]=await Promise.all([
    fetch('data/stats.json').then(r=>r.json()),
    fetch('data/communes.geojson').then(r=>r.json()),
  ]);
  STATS=statsData; META=statsData.meta; GEO=geoData;
  currentVar=META.columns[0].key;

  geoLayer=L.geoJSON(GEO,{
    style:styleFor,
    onEachFeature:(f,layer)=>{
      const nis=f.properties.nis; layersByNis[nis]=layer;
      layer.bindTooltip(()=>tooltipHtml(nis),{className:'commune-tip',sticky:true});
      layer.on('mouseover',()=>{if(nis!==selectedNis)layer.setStyle({weight:1.5,color:'#7dd3fc'});});
      layer.on('mouseout',()=>{geoLayer.setStyle(styleFor);});
      layer.on('click',()=>{renderCommune(nis); map.fitBounds(layer.getBounds(),{maxZoom:11,padding:[40,40]});});
    }
  }).addTo(map);
  map.fitBounds(geoLayer.getBounds(),{padding:[10,10]});

  buildVarSelect();
  refresh();
  setupSearch();
}
init();
</script>
</body>
</html>
